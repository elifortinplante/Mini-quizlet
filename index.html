<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb, #8fd3f4);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 90%;
      max-width: 800px;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      position: relative;
    }
    h1, h2 { text-align: center; color: #333; }
    .hidden { display: none; }

    .set {
      display: flex;
      align-items: center;
      background: #f3f3f3;
      border-radius: 15px;
      padding: 10px;
      margin: 10px 0;
      cursor: pointer;
      transition: 0.3s;
    }
    .set:hover { background: #e8e8e8; }
    .set img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
      margin-right: 15px;
    }
    .set-buttons {
      margin-left: auto;
      display: flex;
      gap: 5px;
    }

    .card-container { perspective: 1000px; margin: 20px 0; }
    .card {
      width: 100%;
      height: 350px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      font-weight: bold;
      text-align: center;
      color: #333;
      overflow: hidden;
    }
    .card-front { background: #fff; }
    .card-back { background: #f0f0f0; transform: rotateY(180deg); }

    .card-face img {
      width: 100%;
      max-height: 250px;
      margin-bottom: 15px;
      object-fit: contain;
    }

    .card-label {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      background: #ccc;
    }

    .answer-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    .answer-buttons button {
      flex: 1;
      margin: 0 5px;
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }
    .correct { background: #a0e7a0; }
    .incorrect { background: #f28b82; }

    #score-screen { text-align: center; }

    .card-editor { margin-bottom: 10px; position: relative; }
    .card-editor input { display: block; width: 95%; margin-bottom: 5px; }
    .btn-color { font-size: 0.85em; }
  </style>
</head>
<body>
<div class="container">

  <div id="home-screen">
    <h1>Mes Sets</h1>
    <button onclick="showSetEditor()">➕ Nouveau set</button>
    <button onclick="document.getElementById('import-file').click()">📥 Importer</button>
    <input type="file" id="import-file" class="hidden" onchange="importSet(event)">
    <div id="sets-list"></div>
  </div>

  <div id="editor-screen" class="hidden">
    <h2>Créer / Modifier</h2>
    <input id="set-title" placeholder="Titre"><br><br>
    <input id="set-subject" placeholder="Matière"><br><br>
    <input id="set-image" placeholder="Image accueil"><br><br>
    <div id="cards-editor"></div>
    <button onclick="addCardEditor()">➕ Ajouter une carte</button><br><br>
    <button onclick="saveSet()">💾 Sauvegarder</button>
    <button onclick="goHome()">🏠 Accueil</button>
  </div>

  <div id="game-screen" class="hidden">
    <h2 id="game-title"></h2>
    <div class="card-container">
      <div class="card" onclick="flipCard()">
        <div class="card-face card-front">
          <img id="card-image-front">
          <div id="card-question"></div>
        </div>
        <div class="card-face card-back">
          <img id="card-image-back">
          <div id="card-answer"></div>
        </div>
      </div>
    </div>
    <div class="answer-buttons">
      <button class="incorrect" onclick="markAnswer(false)">Mauvais</button>
      <button class="correct" onclick="markAnswer(true)">Bon</button>
    </div>
  </div>

  <div id="score-screen" class="hidden">
    <h2>Résultat</h2>
    <p id="final-score"></p>
    <button onclick="goHome()">🏠 Accueil</button>
  </div>
</div>

<script>
let sets = JSON.parse(localStorage.getItem("sets")) || [];
let currentSet=null, currentCards=[], currentIndex=0, errors=[];

function saveSets(){ localStorage.setItem("sets",JSON.stringify(sets)); }

function goHome(){
  document.querySelectorAll(".container>div").forEach(d=>d.classList.add("hidden"));
  home-screen.classList.remove("hidden");
  displaySets();
}

function showSetEditor(i=null){
  document.querySelectorAll(".container>div").forEach(d=>d.classList.add("hidden"));
  editor-screen.classList.remove("hidden");
  cards-editor.innerHTML="";
  if(i!==null){
    currentSet=sets[i];
    set-title.value=currentSet.title;
    set-subject.value=currentSet.subject;
    set-image.value=currentSet.image;
    currentSet.cards.forEach(c=>addCardEditor(c.question,c.answer,c.image,c.color,c.number));
  } else currentSet=null;
}

function addCardEditor(q="",a="",img="",color="",number=""){
  const d=document.createElement("div");
  d.className="card-editor";
  d.dataset.color=color;
  d.dataset.number=number;
  d.innerHTML=`
    <input value="${q}" placeholder="Question">
    <input value="${a}" placeholder="Réponse">
    <input value="${img}" placeholder="Image">
    <button class="btn-color">${number||"Couleur"}</button>
    <button onclick="this.parentElement.remove()">🗑️</button><hr>`;
  cards-editor.appendChild(d);

  const btn=d.querySelector(".btn-color");
  if(color){
    btn.style.background=color;
    btn.style.color="#fff";
  }

  btn.onclick=()=>{
    const c=prompt("Couleur (hex)",d.dataset.color||"#cccccc");
    const n=prompt("Chiffre",d.dataset.number||"");
    if(c){
      d.dataset.color=c;
      d.dataset.number=n;
      btn.textContent=n||"";
      btn.style.background=c;
      btn.style.color="#fff";
    }
  };
}

function saveSet(){
  const cards=[];
  document.querySelectorAll(".card-editor").forEach(d=>{
    const i=d.querySelectorAll("input");
    if(i[0].value && i[1].value){
      cards.push({
        question:i[0].value,
        answer:i[1].value,
        image:i[2].value,
        color:d.dataset.color||"",
        number:d.dataset.number||""
      });
    }
  });
  if(currentSet){
    currentSet.title=set-title.value;
    currentSet.subject=set-subject.value;
    currentSet.image=set-image.value;
    currentSet.cards=cards;
  } else {
    sets.push({title:set-title.value,subject:set-subject.value,image:set-image.value,cards});
  }
  saveSets(); goHome();
}

function displaySets(){
  sets-list.innerHTML="";
  sets.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="set";
    d.innerHTML=`<img src="${s.image||''}"><b>${s.title}</b>`;
    d.onclick=()=>startGame(i);
    sets-list.appendChild(d);
  });
}

function startGame(i){
  currentSet=sets[i];
  const map={};
  currentSet.cards.forEach(c=>{
    const key=c.color||"none";
    if(!map[key]) map[key]=[];
    map[key].push(c);
  });
  for(const k in map) map[k].sort((a,b)=>(a.number||0)-(b.number||0));
  currentCards=Object.keys(map).sort(()=>Math.random()-0.5).flatMap(k=>map[k]);

  currentIndex=0; errors=[];
  document.querySelectorAll(".container>div").forEach(d=>d.classList.add("hidden"));
  game-screen.classList.remove("hidden");
  game-title.textContent=currentSet.title;
  showCard();
}

function showCard(){
  const c=currentCards[currentIndex];
  card-question.textContent=c.question;
  card-answer.textContent=c.answer;

  const label=document.querySelector(".card-label")||(()=>{
    const l=document.createElement("div");
    l.className="card-label";
    document.querySelector(".card-front").appendChild(l);
    return l;
  })();

  if(c.color){
    label.style.background=c.color;
    label.textContent=c.number||"";
  } else {
    label.style.background="#ccc";
    label.textContent="";
  }
}

function flipCard(){ document.querySelector(".card").classList.toggle("flipped"); }
function markAnswer(ok){
  if(!ok) errors.push(currentCards[currentIndex]);
  currentIndex++;
  if(currentIndex<currentCards.length) showCard();
  else alert("Fini");
}

displaySets();
</script>
</body>
</html>

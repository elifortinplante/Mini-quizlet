<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards App</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#a18cd1,#fbc2eb,#8fd3f4);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.container{
  width:90%;
  max-width:800px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
}
.hidden{display:none}
h1,h2{text-align:center}

.set{
  display:flex;
  align-items:center;
  background:#f3f3f3;
  border-radius:15px;
  padding:10px;
  margin:10px 0;
  cursor:pointer;
}
.set img{
  width:60px;
  height:60px;
  border-radius:12px;
  margin-right:15px;
}
.set-buttons{
  margin-left:auto;
  display:flex;
  gap:5px;
}

.card-container{perspective:1000px;margin:20px 0}
.card{
  width:100%;
  height:350px;
  transform-style:preserve-3d;
  transition:.6s;
  cursor:pointer;
}
.card.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:20px;
  padding:20px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}
.card-back{transform:rotateY(180deg);background:#eee}

.card-label{
  position:absolute;
  top:10px;
  right:10px;
  padding:4px 8px;
  border-radius:8px;
  font-weight:bold;
  color:white;
}

.card-editor{margin-bottom:10px}
.card-editor input{width:95%;margin-bottom:5px}

.btn-color{font-size:.85em}
</style>
</head>

<body>
<div class="container">

<!-- ACCUEIL -->
<div id="home-screen">
<h1>Mes Sets</h1>
<button onclick="showSetEditor()">➕ Nouveau set</button>
<button onclick="document.getElementById('import-file').click()">📥 Importer un set</button>
<button onclick="exportAllSets()">💾 Exporter tous les sets</button>
<input type="file" id="import-file" hidden onchange="importSet(event)">
<div id="sets-list"></div>
</div>

<!-- EDITEUR -->
<div id="editor-screen" class="hidden">
<h2>Créer / Modifier un set</h2>
<input id="set-title" placeholder="Titre"><br><br>
<input id="set-subject" placeholder="Matière"><br><br>

<input id="set-image" placeholder="Image couverture">
<input type="file" id="set-image-file" hidden accept="image/*">
<button onclick="document.getElementById('set-image-file').click()">📸 Galerie couverture</button>

<div id="cards-editor"></div>

<button onclick="addCardEditor()">➕ Ajouter une carte</button><br><br>
<button onclick="saveSet()">💾 Sauvegarder</button>
<button onclick="goHome()">🏠 Accueil</button>
</div>

<!-- JEU -->
<div id="game-screen" class="hidden">
<h2 id="game-title"></h2>

<div class="card-container">
<div class="card" onclick="flipCard()">
<div class="card-face card-front">
<img id="card-image-front">
<div id="card-question"></div>
</div>
<div class="card-face card-back">
<img id="card-image-back">
<div id="card-answer"></div>
</div>
</div>
</div>

<button onclick="markAnswer(false)">Mauvais</button>
<button onclick="markAnswer(true)">Bon</button>
</div>

<!-- SCORE -->
<div id="score-screen" class="hidden">
<h2>Résultat</h2>
<p id="final-score"></p>
<button onclick="restartAll()">🔄 Recommencer tout</button>
<button onclick="restartErrors()">❌ Rejouer erreurs</button>
<button onclick="goHome()">🏠 Accueil</button>
</div>

</div>

<script>
let sets=JSON.parse(localStorage.getItem("sets"))||[];
let currentSet=null,currentCards=[],currentIndex=0,errors=[];

function saveSets(){localStorage.setItem("sets",JSON.stringify(sets))}

function goHome(){
  hideAll();document.getElementById("home-screen").classList.remove("hidden");displaySets()
}
function hideAll(){document.querySelectorAll(".container>div").forEach(d=>d.classList.add("hidden"))}

function showSetEditor(i=null){
  hideAll();document.getElementById("editor-screen").classList.remove("hidden");
  document.getElementById("cards-editor").innerHTML="";
  if(i!==null){
    currentSet=sets[i];
    set-title.value=currentSet.title;
    set-subject.value=currentSet.subject;
    set-image.value=currentSet.image;
    currentSet.cards.forEach(c=>addCardEditor(c.question,c.answer,c.image,c.color,c.number));
  }else currentSet=null;
}

function addCardEditor(q="",a="",img="",color="",number=""){
  const d=document.createElement("div");d.className="card-editor";
  d.dataset.color=color;d.dataset.number=number;
  d.innerHTML=`
<input value="${q}" placeholder="Question">
<input value="${a}" placeholder="Réponse">
<input value="${img}" placeholder="Image URL">
<input type="file" class="img" hidden>
<button class="photo">📸 Galerie</button>
<button class="btn-color">${number||"Couleur"}</button>
<button class="del">🗑️ Supprimer cette carte</button><hr>`;
  cards-editor.appendChild(d);

  d.querySelector(".photo").onclick=()=>d.querySelector(".img").click();
  d.querySelector(".img").onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>d.children[2].value=ev.target.result;
    r.readAsDataURL(e.target.files[0]);
  };

  d.querySelector(".btn-color").onclick=()=>{
    const c=document.createElement("input");c.type="color";
    c.oninput=()=>{
      const n=prompt("Chiffre ?");
      d.dataset.color=c.value;
      d.dataset.number=n||"";
      d.querySelector(".btn-color").textContent=n||"";
      d.querySelector(".btn-color").style.background=c.value;
      document.body.removeChild(c);
    };
    document.body.appendChild(c);c.click();
  };

  d.querySelector(".del").onclick=()=>d.remove();
}

function saveSet(){
  const cards=[];
  document.querySelectorAll(".card-editor").forEach(d=>{
    if(d.children[0].value && d.children[1].value)
      cards.push({question:d.children[0].value,answer:d.children[1].value,image:d.children[2].value,color:d.dataset.color,number:d.dataset.number});
  });
  if(currentSet){Object.assign(currentSet,{title:set-title.value,subject:set-subject.value,image:set-image.value,cards})}
  else sets.push({title:set-title.value,subject:set-subject.value,image:set-image.value,cards});
  saveSets();goHome();
}

function displaySets(){
  sets-list.innerHTML="";
  sets.forEach((s,i)=>{
    const d=document.createElement("div");d.className="set";
    d.innerHTML=`<img src="${s.image||''}"><div>${s.title}<br>${s.subject}</div>`;
    d.onclick=()=>startGame(i);
    const b=document.createElement("div");b.className="set-buttons";
    b.innerHTML=`<button onclick="event.stopPropagation();showSetEditor(${i})">✏️</button>
<button onclick="event.stopPropagation();sets.splice(${i},1);saveSets();displaySets()">🗑️</button>`;
    d.appendChild(b);sets-list.appendChild(d);
  });
}

function startGame(i){
  currentSet=sets[i];
  const map={};
  currentSet.cards.forEach(c=>{
    const k=c.color||"none";
    (map[k]=map[k]||[]).push(c);
  });
  Object.values(map).forEach(a=>a.sort((x,y)=>(x.number||0)-(y.number||0)));
  currentCards=[].concat(...Object.keys(map).sort(()=>Math.random()-.5).map(k=>map[k]));
  currentIndex=0;errors=[];
  hideAll();game-screen.classList.remove("hidden");
  game-title.textContent=currentSet.title;
  showCard();
}

function showCard(){
  const c=currentCards[currentIndex];
  card-question.textContent=c.question;
  card-answer.textContent=c.answer;

  let l=document.querySelector(".card-label");
  if(!l){
    l=document.createElement("div");
    l.className="card-label";
    document.querySelector(".card-front").appendChild(l);
  }

  if(c.color){
    l.style.background=c.color;
    l.textContent=c.number||"";
  }else{
    l.style.background="#b0b0b0";
    l.textContent="";
  }
  document.querySelector(".card").classList.remove("flipped");
}

function flipCard(){document.querySelector(".card").classList.toggle("flipped")}
function markAnswer(b){if(!b)errors.push(currentCards[currentIndex]);currentIndex++;currentIndex<currentCards.length?showCard():endGame()}
function endGame(){hideAll();score-screen.classList.remove("hidden");final-score.textContent=`${currentCards.length-errors.length}/${currentCards.length}`}
function restartAll(){startGame(sets.indexOf(currentSet))}
function restartErrors(){if(errors.length){currentCards=[...errors];currentIndex=0;errors=[];hideAll();game-screen.classList.remove("hidden");showCard()}}

goHome();
</script>
</body>
</html>
